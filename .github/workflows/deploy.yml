name: Deploy Web App to cPanel

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch uses that name

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # This sends files to your cPanel Node app root folder
        server-dir: /repositories/my-app-folder/ 
        # Exclude local configurations and git logs from uploading
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**